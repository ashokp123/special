<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Question ❤️</title>
 
<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, sans-serif;
    overflow:hidden;
}
 
.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    max-width:600px;
}
 
h1{
    color:#e91e63;
}
 
p{
    font-size:18px;
    color:#555;
}
 
.buttons{
    margin-top:30px;
    position:relative;
    height:120px;
}
 
button{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}
 
#accept{
    background:#4CAF50;
    color:white;
    margin-right:20px;
}
 
#reject{
    background:#f44336;
    color:white;
    position:absolute;
}
 
#message{
    margin-top:25px;
    font-size:24px;
    color:#e91e63;
    font-weight:bold;
}
</style>
</head>
 
<body>
 
<div class="container">
    <h1>❤️ A Special Question ❤️</h1>
 
    <p>
        My Love,<br><br>
        You are the most beautiful part of my life.
        Every day with you is a blessing and every moment with you is precious.
    </p>
 
    <h2>Will you continue being my favorite person forever? ❤️</h2>
 
    <div class="buttons">
        <button id="accept">❤️ ACCEPT</button>
        <button id="reject">💔 REJECT</button>
    </div>
 
    <div id="message"></div>
</div>
 
<script>
 
const rejectBtn = document.getElementById("reject");
 
rejectBtn.style.left = "300px";
rejectBtn.style.top = "10px";
 
rejectBtn.addEventListener("mouseover", () => {
 
    const maxX = window.innerWidth - 150;
    const maxY = window.innerHeight - 100;
 
    const randomX = Math.floor(Math.random() * maxX);
    const randomY = Math.floor(Math.random() * maxY);
 
    rejectBtn.style.position = "fixed";
    rejectBtn.style.left = randomX + "px";
    rejectBtn.style.top = randomY + "px";
});
 
document.getElementById("accept").addEventListener("click", () => {
 
    document.getElementById("message").innerHTML =
    "🥰 Yay! I Love You Forever ❤️<br><br>Thank you for choosing me every day.";
 
    createHearts();
});
 
function createHearts(){
 
    for(let i=0;i<40;i++){
 
        const heart=document.createElement("div");
        heart.innerHTML="❤️";
 
        heart.style.position="fixed";
        heart.style.left=Math.random()*100+"vw";
        heart.style.top="100vh";
        heart.style.fontSize=(20+Math.random()*30)+"px";
 
        document.body.appendChild(heart);
 
        let pos=100;
 
        const interval=setInterval(()=>{
 
            pos--;
 
            heart.style.top=pos+"vh";
 
            if(pos<0){
                clearInterval(interval);
                heart.remove();
            }
 
        },20);
    }
}
</script>
 
</body>
</html>
